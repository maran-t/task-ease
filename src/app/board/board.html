<div class="min-h-screen bg-[#f7f8fa] text-slate-800 font-sans p-6 md:p-10 flex flex-col">
  <!-- Header -->
  <header class="mb-8 flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-semibold tracking-tight text-slate-900">Task Dashboard</h1>
      <p class="text-slate-500 text-sm mt-1">Manage and track your team's progress.</p>
    </div>
    <button class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium py-2 px-4 rounded-lg shadow-sm transition-colors flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
        <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
      </svg>
      New Task
    </button>
  </header>

  <!-- Board -->
  <div class="flex gap-6 overflow-x-auto pb-4 flex-1 items-start">
    <div
      *ngFor="let column of columns"
      class="bg-slate-100/50 rounded-xl p-3 w-80 shrink-0 border border-slate-200/60 shadow-sm flex flex-col max-h-full"
    >
      <!-- Column Header -->
      <div class="flex items-center justify-between mb-3 px-1">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full {{ column.color }}"></span>
          <h2 class="text-sm font-semibold text-slate-700">{{ column.title }}</h2>
          <span class="bg-slate-200/70 text-slate-600 text-xs py-0.5 px-2 rounded-md font-medium ml-1">
            {{ column.tasks.length }}
          </span>
        </div>
        <button class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-md hover:bg-slate-200">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M3 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
          </svg>
        </button>
      </div>

      <!-- Task List -->
      <div
        cdkDropList
        [id]="column.id"
        [cdkDropListData]="column.tasks"
        [cdkDropListConnectedTo]="connectedDropLists"
        class="flex flex-col gap-2.5 min-h-[150px] overflow-y-auto"
        (cdkDropListDropped)="drop($event)"
      >
        <!-- Task Card -->
        <div
          *ngFor="let task of column.tasks"
          cdkDrag
          class="bg-white p-3.5 rounded-lg shadow-sm border border-slate-200 cursor-grab active:cursor-grabbing hover:border-slate-300 hover:shadow-md transition-all group"
        >
          <!-- Tags and ID -->
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs font-semibold text-slate-500">{{ task.taskId }}</span>
            <span class="text-[10px] font-semibold uppercase tracking-wide py-0.5 px-2 rounded-full bg-indigo-50 text-indigo-600 border border-indigo-100">
              {{ task.tag }}
            </span>
          </div>

          <!-- Title & Description -->
          <h3 class="font-medium text-slate-900 leading-snug mb-1 group-hover:text-indigo-600 transition-colors">{{ task.title }}</h3>
          <p class="text-xs text-slate-500 leading-relaxed mb-4 line-clamp-2">{{ task.description }}</p>

          <!-- Footer (Avatar & Priority) -->
          <div class="flex justify-between items-center mt-auto pt-2 border-t border-slate-50">
            <div class="flex items-center gap-1">
              <svg *ngIf="task.priority === 'high'" class="text-red-500 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
              </svg>
               <svg *ngIf="task.priority === 'medium'" class="text-orange-400 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd" />
              </svg>
              <svg *ngIf="task.priority === 'low'" class="text-blue-400 w-4 h-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
              </svg>
            </div>
            <img [src]="task.avatar" alt="Assignee Avatar" class="w-6 h-6 rounded-full border border-slate-200">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
