<div class="min-h-screen bg-gray-50 text-gray-900 font-sans p-8">
  <header class="mb-8">
    <h1 class="text-3xl font-bold tracking-tight text-gray-900">Task Dashboard</h1>
    <p class="text-gray-500 mt-1">Manage your tasks effortlessly.</p>
  </header>

  <div class="flex gap-6 overflow-x-auto pb-4 h-full items-start">
    <div
      *ngFor="let column of columns"
      class="bg-gray-100/80 rounded-2xl p-4 w-80 shrink-0 border border-gray-200 shadow-sm flex flex-col"
    >
      <div class="flex items-center justify-between mb-4 px-2">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-700">
          {{ column.title }}
        </h2>
        <span class="bg-gray-200 text-gray-600 text-xs py-0.5 px-2.5 rounded-full font-medium">
          {{ column.tasks.length }}
        </span>
      </div>

      <div
        cdkDropList
        [id]="column.id"
        [cdkDropListData]="column.tasks"
        [cdkDropListConnectedTo]="connectedDropLists"
        class="flex flex-col gap-3 min-h-[150px] p-2"
        (cdkDropListDropped)="drop($event)"
      >
        <div
          *ngFor="let task of column.tasks"
          cdkDrag
          class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 cursor-grab active:cursor-grabbing hover:shadow-md transition-shadow"
        >
          <div class="flex flex-col gap-1">
            <span class="font-medium text-gray-900 leading-tight">{{ task.title }}</span>
            <span class="text-sm text-gray-500 leading-snug">{{ task.description }}</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
