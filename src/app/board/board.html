<div class="kanban-root" role="application" aria-label="TaskEase Kanban board">
  <header class="kanban-header">
    <div>
      <h1 class="kanban-title">TaskEase</h1>
      <p class="kanban-subtitle text-muted">A calm, focused workspace for your tasks.</p>
    </div>

    <div class="kanban-controls">
      <input type="search" placeholder="Search tasks..." aria-label="Search tasks" class="search-input" />
      <button class="btn-new-task" (click)="addTask()" aria-label="Add task">+ New Task</button>
    </div>
  </header>

  <div class="columns" role="list">
    <div *ngFor="let column of columns" class="column" role="listitem">
      <div class="column-header">
        <h2 class="column-title">{{ column.title }}</h2>
        <div class="column-meta">
          <span class="badge" aria-hidden="true">{{ column.tasks.length }}</span>
        </div>
      </div>

      <div
        cdkDropList
        [id]="column.id"
        [cdkDropListData]="column.tasks"
        [cdkDropListConnectedTo]="connectedDropLists"
        class="drop-list"
        (cdkDropListDropped)="drop($event)"
        role="list"
        [attr.aria-labelledby]="column.id"
      >
        <div *ngFor="let task of column.tasks" cdkDrag role="listitem" class="task-card">
          <div class="task-top">
            <div class="task-title">{{ task.title }}</div>
            <div class="priority-dot" aria-hidden="true"></div>
          </div>
          <div class="task-desc text-muted">{{ task.description }}</div>
          <div class="task-footer">
            <span class="pill">ID {{ task.id }}</span>
            <button class="btn-small" aria-label="Open task">Open</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
